name: Juliana Daily Plan
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  send-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily plan to Telegram
        env:
          BOT_TOKEN: "8632418399:AAGaAg6vONo7HYVGvwDcBZ1ZefC5SpFBrKQ"
          CHAT_ID: "600328534"
        run: |
          DAY=$(TZ="Europe/Moscow" date +"%u")
          DATE=$(TZ="Europe/Moscow" date +"%d.%m")
          case $DAY in
            1) TEXT=$(printf "Ponedelnik %s\n\nNa segodnya:\n- Laif-post\n- Rassylka offerov\n- Statistika\n\n100k: 3 bota x 25k + 5 auditov x 990r + 20 gajdov x 990r\n\nCel: 100k/mes" "$DATE") ;;
            2) TEXT=$(printf "Vtornik %s\n\nNa segodnya:\n- Otvetit na vkhodyashchie\n- Opublikovat lid-magnit\n- Rassylka eshche 3 chata\n\nVoronka: post -> lid-magnit -> audit 990r -> bot pod kluch\n\nCel: 100k/mes" "$DATE") ;;
            3) TEXT=$(printf "Sreda %s - Den kejsov.\n\nNa segodnya:\n- Opublikovat kejs s cenoj + CTA pishi BOT\n- Rassylka v chaty (LeadConverter, Kod Legendy)\n- Analitika postov nedeli\n\nKejs s ciframi = doverie bez ugovorov.\n\nCel: 100k/mes" "$DATE") ;;
            4) TEXT=$(printf "Chetverg %s.\n\nNa segodnya:\n- Dozhat vcherashnye chaty\n- Proverit voronku: zakrep -> kejsy -> audit\n- Podgotovit kejs dlya pyatnichnogo posta\n\nSkhema: klient -> audit 990r -> bot pod kluch\n\nCel: 100k/mes" "$DATE") ;;
            5) TEXT=$(printf "Pyatnica %s - Den offerov.\n\nNa segodnya:\n- Pryamoj offer pishi BOT\n- Finalnaya rassylka nedeli\n- Itogi: skolko dialogov, skolko auditov\n\nDeficit rabotaet tolko esli on nastoyashchij.\n\nCel: 100k/mes" "$DATE") ;;
            6) TEXT=$(printf "Subbota %s.\n\nNa segodnya:\n- Promty subbot (rubrika AI)\n- Idei postov na sleduyu nedelu\n- Otdohnyt - vygorevshij ekspert ne prodaet\n\nKazhdy post - kirpich v fundamente.\n\nCel: 100k/mes" "$DATE") ;;
            7) TEXT=$(printf "Voskresenye %s - Plan na nedelu.\n\nNa segodnya:\n- Kontent-plan: pn/sr/pt/sb\n- Chernoviki 2 postov\n- 3 glavnykh dejstviya na nedelu\n\nNedelya bez plana = nedelya bez deneg.\n\nCel: 100k/mes" "$DATE") ;;
          esac
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
