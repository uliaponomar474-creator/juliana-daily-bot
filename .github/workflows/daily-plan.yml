name: Juliana Daily Plan
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  send-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram
        run: |
          DAY=$(TZ="Europe/Moscow" date +"%u")
          DATE=$(TZ="Europe/Moscow" date +"%d.%m")
          case $DAY in
            1) MSG="📅 Понедельник, $DATE

Начинаем неделю — сегодня закладываем фундамент.

На сегодня:
- Опубликовать лайф-пост (рубрика «Не тяжёлый понедельник»)
- Разослать оффер в 3 нетворкинга Старостина
- Проверить статистику канала за прошлую неделю

💡 Математика 100к: 3 бота × 25к + 5 аудитов × 990₽ + 20 гайдов × 990₽
Сегодняшняя рассылка — это клиенты на боты. Каждое сообщение = шаг к цели.

💙 Цель: 100к/мес";;

            2) MSG="📅 Вторник, $DATE

Середина начала — не тормозим.

На сегодня:
- Ответить на все входящие сообщения
- Доработать или опубликовать лид-магнит «Выгораешь в переписках?»
- Рассылка офферов: ещё 3 чата из списка

💡 Воронка: пост → лид-магнит → аудит 990₽ → бот под ключ
Лид-магнит греет тех кто ещё не готов купить. Отправь его сегодня.

💙 Цель: 100к/мес";;

            3) MSG="📅 Среда, $DATE

День кейсов — это твои лучшие продажи.

На сегодня:
- Опубликовать кейс с ценой + CTA «пиши БОТ»
- Рассылка в чаты (приоритет: LeadConverter, Код Легенды)
- Аналитика постов: что зашло на этой неделе

💡 Кейс с цифрами = доверие без уговоров
Один хороший кейс приносит больше клиентов чем 10 постов про «я эксперт».

💙 Цель: 100к/мес";;

            4) MSG="📅 Четверг, $DATE

Рабочий день — без лирики.

На сегодня:
- Рассылка офферов: дожать вчерашние чаты
- Проверить воронку: закреп → кейсы → аудит
- Подготовить кейс для пятничного поста

💡 Схема продажи: клиент → аудит 990₽ → бот под ключ
Аудит — это не продукт, это вход. Предлагай его всем кто пишет.

💙 Цель: 100к/мес";;

            5) MSG="📅 Пятница, $DATE

Пятница — день офферов. Люди решают к выходным.

На сегодня:
- Опубликовать прямой оффер «пиши БОТ» (2 места в апреле)
- Финальная рассылка недели
- Итоги: сколько диалогов, сколько аудитов продано

💡 Дефицит работает только если он настоящий
«2 места» — это реально? Если да — говори об этом прямо.

💙 Цель: 100к/мес";;

            6) MSG="📅 Суббота, $DATE

Суббота — промты и идеи.

На сегодня:
- Опубликовать «Промты субботы» (рубрика AI-промтов)
- Записать идеи для постов на следующую неделю
- Отдохнуть — выгоревший эксперт не продаёт

💡 Пансионат у Азовского моря строится сейчас
Каждый пост, каждая рассылка — это кирпич. Суббота — осмотреть постройку.

💙 Цель: 100к/мес";;

            7) MSG="📅 Воскресенье, $DATE

Воскресенье — план на неделю.

На сегодня:
- Составить контент-план: пн/ср/пт/сб
- Подготовить черновики 2 постов
- Определить 3 главных действия на неделю к 100к

💡 Неделя без плана = неделя без денег
10 минут планирования сегодня = 10 часов не потраченных впустую завтра.

💙 Цель: 100к/мес";;
          esac
          ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$MSG")
          curl -s "https://api.telegram.org/bot8632418399:AAGaAg6vONo7HYVGvwDcBZ1ZefC5SpFBrKQ/sendMessage?chat_id=600328534&text=$ENCODED"
