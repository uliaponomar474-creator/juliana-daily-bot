name: Juliana Daily Plan
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  send-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily plan to Telegram
        env:
          BOT_TOKEN: "8632418399:AAGaAg6vONo7HYVGvwDcBZ1ZefC5SpFBrKQ"
          CHAT_ID: "600328534"
        run: |
          DAY=$(TZ="Europe/Moscow" date +"%u")
          DATE=$(TZ="Europe/Moscow" date +"%d.%m")
          case $DAY in
            1) TEXT="Понедельник, ${DATE}. Начинаем неделю - закладываем фундамент.

На сегодня:
- Лайф-пост (рубрика Не тяжёлый понедельник)
- Рассылка офферов в 3 нетворкинга Старостина
- Проверить статистику канала

100к: 3 бота x 25к + 5 аудитов x 990р + 20 гайдов x 990р
Каждое сообщение = шаг к цели.

Цель: 100к/мес" ;;
            2) TEXT="Вторник, ${DATE}. Не тормозим.

На сегодня:
- Ответить на входящие
- Опубликовать лид-магнит Выгораешь в переписках?
- Рассылка офферов ещё 3 чата

Воронка: пост -> лид-магнит -> аудит 990р -> бот под ключ
Лид-магнит греет тех кто ещё не готов купить.

Цель: 100к/мес" ;;
            3) TEXT="Среда, ${DATE}. День кейсов - это твои лучшие продажи.

На сегодня:
- Опубликовать кейс с ценой + CTA пиши БОТ
- Рассылка в чаты (LeadConverter, Код Легенды)
- Аналитика постов недели

Кейс с цифрами = доверие без уговоров.

Цель: 100к/мес" ;;
            4) TEXT="Четверг, ${DATE}. Рабочий день - без лирики.

На сегодня:
- Дожать вчерашние чаты с рассылкой
- Проверить воронку: закреп -> кейсы -> аудит
- Подготовить кейс для пятничного поста

Схема: клиент -> аудит 990р -> бот под ключ
Аудит - это вход. Предлагай его всем кто пишет.

Цель: 100к/мес" ;;
            5) TEXT="Пятница, ${DATE}. День офферов. Люди решают к выходным.

На сегодня:
- Прямой оффер пиши БОТ
- Финальная рассылка недели
- Итоги: сколько диалогов, сколько аудитов

Дефицит работает только если он настоящий.

Цель: 100к/мес" ;;
            6) TEXT="Суббота, ${DATE}. Промты и идеи.

На сегодня:
- Опубликовать рубрику Промты субботы
- Записать идеи постов на следующую неделю
- Отдохнуть - выгоревший эксперт не продаёт

Каждый пост - кирпич в фундаменте. Суббота - осмотреть постройку.

Цель: 100к/мес" ;;
            7) TEXT="Воскресенье, ${DATE}. План на неделю.

На сегодня:
- Контент-план: пн/ср/пт/сб
- Черновики 2 постов
- 3 главных действия на неделю к 100к

Неделя без плана = неделя без денег.
10 минут планирования сегодня = 10 часов не потраченных впустую завтра.

Цель: 100к/мес" ;;
          esac
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"             --data-urlencode "chat_id=${CHAT_ID}"             --data-urlencode "text=${TEXT}"
