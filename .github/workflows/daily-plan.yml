name: Juliana Daily Plan
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  send-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily plan to Telegram
        env:
          BOT_TOKEN: "8632418399:AAGaAg6vONo7HYVGvwDcBZ1ZefC5SpFBrKQ"
          CHAT_ID: "600328534"
        run: |
          DAY=$(TZ="Europe/Moscow" date +"%u")
          DATE=$(TZ="Europe/Moscow" date +"%d.%m")
          case $DAY in
            1) TEXT=$(printf "Юля, понедельник %s - начинаем неделю!\n\nМАТЕМАТИКА 100к/мес:\n3 бота x 25 000 + 5 аудитов x 990 + 20 гайдов x 990 = 100 450 руб\n\nНа сегодня:\n- Лайф-пост (рубрика Не тяжёлый понедельник)\n- Рассылка оффера в 3 нетворкинга Старостина\n- Проверить статистику канала за неделю\n\nКаждый диалог сегодня = шаг к цели.\nДействуй." "$DATE") ;;
            2) TEXT=$(printf "Вторник %s - не тормозим!\n\nВОРОНКА:\nпост -> лид-магнит -> аудит 990 -> бот под ключ\n\nНа сегодня:\n- Ответить на все входящие\n- Опубликовать лид-магнит Выгораешь в переписках?\n- Рассылка в ещё 3 чата из списка\n\nЛид-магнит греет тех кто ещё не готов купить.\nОтправь его сегодня." "$DATE") ;;
            3) TEXT=$(printf "Среда %s - день кейсов!\n\nОДИН ХОРОШИЙ КЕЙС ЛУЧШЕ 10 ПОСТОВ ПРО Я ЭКСПЕРТ\n\nНа сегодня:\n- Опубликовать кейс с ценой + пиши БОТ\n- Рассылка в чаты (LeadConverter, Код Легенды)\n- Аналитика: что зашло на этой неделе\n\nКейс с цифрами = доверие без уговоров.\nЛюди покупают у того кому доверяют." "$DATE") ;;
            4) TEXT=$(printf "Четверг %s - рабочий день без лирики!\n\nСХЕМА ПРОДАЖИ:\nклиент пишет -> предложи аудит 990 -> закрывай на бота\n\nНа сегодня:\n- Дожать вчерашние чаты\n- Проверить воронку: закреп -> кейсы -> аудит\n- Подготовить кейс для пятничного поста\n\nАудит - это не продукт, это ВХОД.\nПредлагай его всем кто пишет." "$DATE") ;;
            5) TEXT=$(printf "Пятница %s - день офферов!\n\nЛЮДИ РЕШАЮТ К ВЫХОДНЫМ.\n\nНа сегодня:\n- Прямой оффер: пиши БОТ\n- Финальная рассылка недели\n- Итоги: сколько диалогов, сколько аудитов\n\nПодведи итог недели: что работает, что убрать.\nКаждый шаг ближе к 100к." "$DATE") ;;
            6) TEXT=$(printf "Суббота %s - промты и идеи!\n\nКАЖДЫЙ ПОСТ = КИРПИЧ В ФУНДАМЕНТЕ.\n\nНа сегодня:\n- Опубликовать рубрику Промты субботы\n- Записать идеи постов на следующую неделю\n- Отдохнуть - выгоревший эксперт не продаёт\n\nСуббота - осмотреть постройку.\nСколько кирпичей положено за эту неделю?" "$DATE") ;;
            7) TEXT=$(printf "Воскресенье %s - план на неделю!\n\nНЕДЕЛЯ БЕЗ ПЛАНА = НЕДЕЛЯ БЕЗ ДЕНЕГ.\n\nНа сегодня:\n- Контент-план: пн/ср/пт/сб\n- Черновики 2 постов\n- 3 главных действия к 100к на эту неделю\n\n10 минут планирования = 10 часов не потраченных впустую.\nПросто запиши. Просто сделай." "$DATE") ;;
          esac
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
